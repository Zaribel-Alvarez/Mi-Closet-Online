    <script>
    const inputBusqueda = document.getElementById('input-busqueda');
    const btnBuscar = document.getElementById('btn-buscar');

    // Función para realizar la búsqueda
    function realizarBusqueda() {
        const termino = inputBusqueda.value.toLowerCase().trim();

        if (termino === "") {
            alert("Por favor, escribe algo para buscar.");
            return;
        }

        // Diccionario de páginas según lo que escriban
        if (termino.includes("botas") || termino.includes("tacones") || termino.includes("sandalias")) {
            window.location.href = "zapatos.html";
        } 
        else if (termino.includes("vestido") || termino.includes("boda") || termino.includes("fiesta")) {
            window.location.href = "vestidos.html";
        } 
        else if (termino.includes("blusa") || termino.includes("top") || termino.includes("camisa")) {
            window.location.href = "blusas.html";
        } 
        else if (termino.includes("short") || termino.includes("pantalón corto")) {
            window.location.href = "shorts.html";
        } 
        else if (termino.includes("conjunto") || termino.includes("set")) {
            window.location.href = "conjuntos.html";
        } 
        else if (termino.includes("enagua") || termino.includes("falda")) {
            window.location.href = "enaguas.html";
        } 
        else if (termino.includes("Dueña") || termino.includes("Zaribel") || termino.includes("contacto")) {
            window.location.href = "sobre-mi.html";
        } 
        
        else {
            alert("Lo sentimos, no encontramos resultados para: " + termino + ". Intenta con 'vestidos', 'zapatos' o 'blusas'.");
        }
    }

    // Escuchar el clic en la lupa
    btnBuscar.addEventListener('click', realizarBusqueda);

    // Escuchar cuando presionan la tecla "Enter"
    inputBusqueda.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            realizarBusqueda();
        }
    });
</script>
